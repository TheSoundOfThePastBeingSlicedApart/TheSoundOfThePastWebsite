<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Sound Of the Past Being Sliced Apart</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <script src="script.js"></script>
    <div class="index-grid">
      <audio id="sound5" src="public/sound5.mp3" preload="auto"></audio>
      <audio id="sound1" src="public/sound1.mp3" preload="auto"></audio>
      <audio id="sound4" src="public/sound4.mp3" preload="auto"></audio>
      <audio id="sound11" src="public/sound11.mp3" preload="auto"></audio>
      <audio id="sound8" src="public/sound8.mp3" preload="auto"></audio>
      <button
        onclick="playSound('sound5', this)"
        style="grid-column: 1 / 1; grid-row: 3 / 3"
      >
        <img class="fast_fade" src="public/Asset15.png" alt="Asset15" />
      </button>
      <button
        onclick="playSound('sound1', this)"
        style="grid-column: 7 / 7; grid-row: 8 / 8"
      >
        <img class="medium_fade" src="public/Asset7.png" alt="Asset15" />
      </button>
      <button
        onclick="playSound('sound4', this)"
        style="grid-column: 2 / 2; grid-row: 9 / 9"
      >
        <img class="slow_fade" src="public/Asset17.png" alt="Asset15" />
      </button>
      <button
        onclick="playSound('sound11', this)"
        style="grid-column: 10 / 10; grid-row: 7 / 7"
      >
        <img class="medium_fade" src="public/Asset13.png" alt="Asset15" />
      </button>
      <button
        onclick="playSound('sound8', this)"
        style="grid-column: 8 / 8; grid-row: 2 / 2"
      >
        <img class="fast_fade" src="public/Asset4.png" alt="Asset15" />
      </button>

      <div class="header-container">
        <h1>
          <a href="dates.html">The Sound Of The Past Being Sliced Apart</a>
        </h1>
      </div>
    </div>
  </body>
</html>
